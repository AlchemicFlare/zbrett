# zBRETT CI — lint + test + secret-scan on every push; mirror main & tags to public GitHub (EUPL-1.2).
image: python:3.11-slim

definitions:
  steps:
    - step: &verify
        name: Lint + test + REUSE
        caches: [pip]
        script:
          - pip install -q uv
          # REUSE first, on the clean checkout BEFORE .venv exists: the slim image has no
          # git, so reuse can't read .gitignore to skip .venv. uvx runs it in an ephemeral
          # env (no project .venv created); charset-normalizer covers the encoding backend.
          - uvx --from "reuse[charset-normalizer]" reuse lint
          - uv sync --all-packages --group dev
          - uv run ruff check .
          - uv run pytest

    - step: &secrets
        name: Secret scan (gitleaks)
        image: atlassian/default-image:latest   # needs git for history scan
        clone:
          depth: full                            # scan the whole history, not just the tip
        script:
          - GITLEAKS_VERSION=8.21.2
          - curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gl.tgz
          - tar -xzf /tmp/gl.tgz -C /usr/local/bin gitleaks
          - gitleaks version
          # fails the build (exit 1) on any detected secret → mirror step never runs
          - gitleaks detect --source . --redact --no-banner --exit-code 1

    - step: &mirror
        name: Mirror to GitHub
        image: atlassian/default-image:latest   # has git + ssh (slim python image does not)
        clone:
          depth: full                            # push complete history to the mirror
        script:
          # One-way public EUPL-1.2 mirror over SSH. Auth: a Pipelines SSH key
          # (Repo settings -> Pipelines -> SSH keys) registered as a WRITE deploy key on
          # the GitHub repo, with github.com added to the Pipelines known hosts.
          - bash tools/mirror-to-github.sh

pipelines:
  pull-requests:
    '**':
      - step: *verify
      - step: *secrets
  branches:
    main:
      - step: *verify
      - step: *secrets
      - step: *mirror
  tags:
    '*':
      - step: *secrets
      - step: *mirror
