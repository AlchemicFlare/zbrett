[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brett-fettnetz"
version = "0.0.0"
description = "zBRETT fat-net bridge: wantlist, IPFS/Kubo fetch, gateway/pinning (E6)"
readme = "README.md"
requires-python = ">=3.11"
license = "EUPL-1.2"
authors = [{ name = "protagx", email = "hello@protagx.com" }]
dependencies = [
    "httpx>=0.27"
]

[tool.hatch.build.targets.wheel]
packages = ["src/brett/fettnetz"]

[tool.uv.sources]
brett-core = { workspace = true }
