[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brett-core"
version = "0.0.0"
description = "zBRETT data layer: DAG store, dag-cbor/CIDv1 codec, policy, dictionary index (E2)"
readme = "README.md"
requires-python = ">=3.11"
license = "EUPL-1.2"
authors = [{ name = "protagx", email = "hello@protagx.com" }]
dependencies = [
    "cbor2>=5.6"
]

[tool.hatch.build.targets.wheel]
packages = ["src/brett/core"]
