[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brett-governor"
version = "0.0.0"
description = "DutyCycleInterface: airtime-accounting RNS interface for LoRa hubs (E4)"
readme = "README.md"
requires-python = ">=3.11"
license = "EUPL-1.2"
authors = [{ name = "protagx", email = "hello@protagx.com" }]
dependencies = [
    "rns>=0.7",
    "prometheus-client>=0.20"
]

[tool.hatch.build.targets.wheel]
packages = ["src/brett/governor"]
