[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brett-dict"
version = "0.0.0"
description = "zBRETT dictionary training + M3 compression bake-off (E1/E7)"
readme = "README.md"
requires-python = ">=3.11"
license = "EUPL-1.2"
authors = [{ name = "protagx", email = "hello@protagx.com" }]
dependencies = [
    "zstandard>=0.22",
    "brotli>=1.1"
]

[tool.hatch.build.targets.wheel]
packages = ["src/brett/dict_train"]
